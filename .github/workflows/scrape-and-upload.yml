# Centralized scrape pipeline — runs every 30 min on GitHub Actions free tier.
# Scrapes the 220+ company ATS feeds, then POSTs the results to the Cloudflare
# Worker /ingest endpoint where they're written to D1 + queued for AI
# preprocessing. The local SQLite app is unaffected.
#
# Public repos get unlimited Actions minutes — this stays free at any scale.
#
# Repo secrets required:
#   CF_INGEST_URL     e.g. https://reverse-ats-ingest.<your-account>.workers.dev/ingest
#   CF_INGEST_SECRET  same value you set via `wrangler secret put INGEST_SECRET`

name: scrape-and-upload

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes (UTC)
  workflow_dispatch:         # also allow manual runs from the Actions tab

# Avoid stacking runs if a previous one is still going (some scrapes can be slow).
concurrency:
  group: scrape-and-upload
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25      # 220 companies × ~1s rate limit + scoring buffer
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run scrape + push to D1
        env:
          CF_INGEST_URL: ${{ secrets.CF_INGEST_URL }}
          CF_INGEST_SECRET: ${{ secrets.CF_INGEST_SECRET }}
          # Use a temp DB inside the runner — disposable, just for one run.
          REVERSE_ATS_DB_PATH: /tmp/scrape-runner.db
          # Workday's Akamai edge soft-blocks GitHub Actions IP ranges
          # (200 OK with empty results). The Workday lane is scraped from
          # GX10 instead via scripts/scrape_workday_gx10.py and pushed to
          # the same /ingest endpoint. This flag tells pipeline.py to skip
          # Workday tenants here so we don't waste minutes on silent zeroes.
          SKIP_WORKDAY: "true"
        run: |
          cd backend
          python pipeline.py --skip-score --push-to-d1

      - name: Show ingest health
        if: always()
        env:
          CF_INGEST_URL: ${{ secrets.CF_INGEST_URL }}
        run: |
          # /health is a different path off the same Worker; derive it from the ingest URL
          HEALTH_URL="${CF_INGEST_URL%/ingest}/health"
          echo "Querying $HEALTH_URL"
          curl -s "$HEALTH_URL" | python3 -m json.tool || echo "(health probe failed — non-fatal)"
