<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf9f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1814" media="(prefers-color-scheme: dark)" />
    <title>Reverse ATS — A kinder way to find your next role</title>
    <meta
      name="description"
      content="Most job tools work for the companies. This one works for you. Open-source. Finds the openings. Scores the fit. Drafts the cover letter. Tracks every step."
    />
    <link rel="canonical" href="https://reverse-ats.app/" />
    <meta property="og:site_name" content="Reverse ATS" />
    <meta property="og:title" content="Reverse ATS — A kinder way to find your next role" />
    <meta property="og:description" content="Most job tools work for the companies. This one works for you. Open-source. Finds the openings. Scores the fit. Drafts the cover letter. Tracks every step." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reverse-ats.app/" />
    <meta property="og:image" content="https://reverse-ats.app/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Reverse ATS — A kinder way to find your next role" />
    <meta name="twitter:description" content="Most job tools work for the companies. This one works for you." />
    <meta name="twitter:image" content="https://reverse-ats.app/og-image.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Reverse ATS",
        "url": "https://reverse-ats.app/",
        "description": "Open-source job search tool. Finds openings at 220+ companies, scores fit against your resume, drafts cover letters, tracks every application.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Windows, macOS, Linux",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "license": "https://opensource.org/licenses/MIT"
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Apply persisted theme BEFORE React paints — eliminates the flash
         of wrong theme on first load. Mirrors NO_FLASH_SCRIPT in lib/theme.tsx. -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('reverse-ats-theme');
          var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
